<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Risk | Business Risk System</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-panel fixed-top mx-3 mt-3">
        <div class="container-fluid">
            <a class="navbar-brand text-gradient" href="/">RiskAI</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-toggle="target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/#features">Features</a></li>
                    <li class="nav-item"><a class="nav-link" href="/#models">Models</a></li>
                    <li class="nav-item"><a class="btn btn-primary-custom ms-lg-3 mt-2 mt-lg-0" href="/predict">Start Predicting</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px; padding-bottom: 80px;">
        <div class="row justify-content-center">
            
            <div class="col-lg-8" data-aos="fade-up">
                <div class="text-center mb-5">
                    <h1 class="h1">Enter Business Profiling Metrics</h1>
                    <p class="text-muted">Fill out the indicators below to generate an AI-powered Risk Score.</p>
                </div>

                <!-- Result Card (Hidden by default) -->
                <div id="resultCard" class="glass-panel result-card mb-5" data-aos="zoom-in" style="display: none;">
                    <h5>Predicted Business Risk Score</h5>
                    <div id="scoreValue" class="risk-score-display">--</div>
                    <h4 class="mb-4">Risk Category: <span id="riskCategory" class="fw-bold">--</span></h4>
                    
                    <button class="btn btn-outline-light px-4 py-2 mt-3" onclick="resetForm()">Evaluate Another Business</button>
                </div>

                <!-- Input Form -->
                <div class="glass-panel p-lg-5 p-4 position-relative" id="formInputCard">
                    <!-- Overlay loader -->
                    <div class="loading-overlay" id="loadingOverlay">
                        <div class="spinner"></div>
                        <div class="ms-3 fw-bold fs-5 text-white">Analyzing Data...</div>
                    </div>

                    <form id="predictForm">
                        <div class="row g-4">
                            <!-- Field 1 -->
                            <div class="col-md-6">
                                <label for="revenue" class="form-label">Annual Revenue ($)</label>
                                <input type="number" step="0.01" class="form-control" id="revenue" name="revenue" placeholder="e.g., 500000" required>
                            </div>
                            
                            <!-- Field 2 -->
                            <div class="col-md-6">
                                <label for="expenses" class="form-label">Annual Expenses ($)</label>
                                <input type="number" step="0.01" class="form-control" id="expenses" name="expenses" placeholder="e.g., 300000" required>
                            </div>

                            <!-- Field 3 -->
                            <div class="col-md-6">
                                <label for="profit_margin" class="form-label">Profit Margin (0.0 - 1.0)</label>
                                <input type="number" step="0.01" min="-50" max="1" class="form-control" id="profit_margin" name="profit_margin" placeholder="e.g., 0.25 for 25%" required>
                            </div>

                            <!-- Field 4 -->
                            <div class="col-md-6">
                                <label for="debt_ratio" class="form-label">Debt to Equity Ratio</label>
                                <input type="number" step="0.01" class="form-control" id="debt_ratio" name="debt_ratio" placeholder="e.g., 0.8" required>
                            </div>

                            <!-- Field 5 -->
                            <div class="col-md-6">
                                <label for="cash_flow" class="form-label">Operating Cash Flow ($)</label>
                                <input type="number" step="0.01" class="form-control" id="cash_flow" name="cash_flow" placeholder="e.g., 150000" required>
                            </div>

                            <!-- Field 6 -->
                            <div class="col-md-6">
                                <label for="market_growth" class="form-label">Market Growth Rate (%)</label>
                                <input type="number" step="0.01" class="form-control" id="market_growth" name="market_growth" placeholder="e.g., 5.5" required>
                            </div>
                            
                            <!-- Field 7 -->
                            <div class="col-md-6">
                                <label for="years_in_business" class="form-label">Years in Business</label>
                                <input type="number" class="form-control" id="years_in_business" name="years_in_business" placeholder="e.g., 10" required>
                            </div>

                            <!-- Field 8 -->
                            <div class="col-md-6">
                                <label for="employee_count" class="form-label">Number of Employees</label>
                                <input type="number" class="form-control" id="employee_count" name="employee_count" placeholder="e.g., 50" required>
                            </div>
                        </div>

                        <div class="mt-5 text-center">
                            <button type="submit" class="btn btn-primary-custom btn-lg w-100 py-3">
                                Generate Risk Prediction
                            </button>
                        </div>
                    </form>
                </div>
                
            </div>
        </div>
    </div>


    <!-- Footer -->
    <footer class="py-4 text-center mt-auto border-top" style="border-color: rgba(255,255,255,0.1) !important;">
        <div class="container text-muted">
            <p class="mb-0">&copy; 2026 Business Risk Prediction System.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
